name: Build or Release Issue / 构建或发布问题
description: Report package, feed, APK/IPK, install script, or GitHub Actions issues / 反馈安装包、软件源、APK/IPK、一键脚本或 GitHub Actions 问题
title: "[Build]: "
labels: ["ci", "release"]
body:
  - type: markdown
    attributes:
      value: |
        这类 Issue 请务必提供完整安装输出、包名、架构和 Release 标签。只说“装不上 / 包里没有文件”无法定位。
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-check / 提交前自查
      options:
        - label: I have checked the latest release page / 我已经检查过最新 Release 页面
          required: true
        - label: I have included the failed install/build output / 我已提供失败的安装或构建输出
          required: true
        - label: I have verified the package file name, release tag, and architecture / 我已确认包文件名、Release 标签和架构
          required: true
  - type: dropdown
    id: sdk
    attributes:
      label: SDK / Firmware Version / SDK 或固件版本
      options:
        - "25.12"
        - "24.10"
        - "23.05"
        - Other / 其他
    validations:
      required: true
  - type: dropdown
    id: package_format
    attributes:
      label: Package Format / 包格式
      options:
        - IPK / opkg
        - APK / apk
        - Both / 两者都有
        - unknown / 不确定
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: Architecture / 架构
      placeholder: "e.g. x86_64, aarch64_cortex-a53"
    validations:
      required: true
  - type: input
    id: release_tag
    attributes:
      label: Release Tag / Release 标签
      placeholder: "e.g. v2026.07.05.2"
    validations:
      required: true
  - type: input
    id: package_name
    attributes:
      label: Package File Name / 包文件名
      placeholder: "e.g. daed_2026.07.05-r1_aarch64_cortex-a53.ipk"
    validations:
      required: true
  - type: input
    id: package_sha256
    attributes:
      label: Package SHA256 / 包 SHA256
      placeholder: "sha256sum <package-file>"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description / 问题描述
      description: What is wrong with the build, package, feed, or install script? / 构建、安装包、源或一键脚本有什么问题？
    validations:
      required: true
  - type: textarea
    id: install_output
    attributes:
      label: Install or Build Output / 安装或构建输出
      description: Paste full command output, not only the last line. / 粘贴完整命令输出，不要只贴最后一行。
      placeholder: |
        opkg install ...
        apk add ...
        wget -O - ... | ash
      render: shell
    validations:
      required: true
  - type: textarea
    id: package_contents
    attributes:
      label: Package Contents / 包内容
      description: If a file is missing, paste package file list and installed file list. / 如果缺文件，请粘贴包内容和已安装文件列表。
      placeholder: |
        tar -tzf <ipk> 2>/dev/null
        opkg files daed 2>/dev/null
        apk info -L daed 2>/dev/null
        ls -l /usr/bin/dae /usr/bin/daed /usr/bin/daed-guard 2>/dev/null
      render: shell
    validations:
      required: true
  - type: input
    id: feed_manifest
    attributes:
      label: Feed or Manifest URL / 源或 manifest 地址
      placeholder: "https://down.dllkids.xyz/openwrt-feed/daed/24.10/aarch64_cortex-a53/manifest-daede.txt"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional Context / 补充信息
      description: Firmware source, builder URL, Actions run URL, or anything else useful / 固件来源、构建器链接、Actions 链接或其他信息
    validations:
      required: false
